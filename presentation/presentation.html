# What is a Reasoning LLM?

- Language models designed for complex, multi-step problems

--

- Generate intermediate reasoning steps or "thought processes"

--

- Break down tasks into logical sub-steps

--

- Similar to human step-by-step problem solving

--

- **Key Insight**: Pretrained LLMs can already reason - if you decode properly!

--

- More accurate and explainable results on challenging tasks:
  - Mathematical problems
  - Logic puzzles
  - Code debugging

---

  - Claude 4: extended thinking is a toggle, not a different model

# Theory Behind Reasoning

## Why Intermediate Steps Matter

--

- **Circuit Complexity**: Problems of circuit size T require O(T) intermediate tokens

--

- **Serial Processing**: Constant-size transformers solve complex problems through serialization

--

- **Direct vs Step-by-Step**: Direct answer generation may fail without intermediate reasoning

--

- **Thinking Budget**: Performance scales with output length, not just model size

--

- **Justification**: This explains why "let it think longer" improves accuracy

---

# The Big Paradigm Shift: Test-Time Compute Scaling

--

- **Old paradigm**: Scale training compute -> bigger models -> better answers

--

- **New paradigm**: Scale inference compute -> more thinking time -> better answers

--

- Three forms of test-time compute:

--

  1. **Internal reasoning budgets** (thinking tokens)

--

  2. **Parallel sampling** (best-of-N, self-consistency)

--

  3. **Sequential refinement** (critique -> revise loops)

--

- **Why it matters**: You can now dial reasoning depth *per-query*, trading cost for accuracy programmatically

--

- This is the single most important shift in LLM capability since scaling laws

- Direct pattern-based prediction

--

- One-shot "I'm feeling lucky" approach

--

- Quick but less reliable on complex tasks

- Step-by-step problem solving

--

- Chain-of-thought (CoT) approach

- More methodical but slower

--

- Shows intermediate steps

--

- **Decoding matters**: Not just prompting, but how we sample and select

# Advanced Decoding Strategies

## From Prompting to Decoding

--

1. **Multi-Sample Generation**
    - Generate multiple candidate solutions
    - Not just greedy decoding

--

2. **Confidence-Based Selection**
    - Pick most confident answer, not longest rationale
    - Answer confidence correlates with correctness

--

3. **Self-Consistency Voting**
    - Sample multiple paths
    - Majority vote on final answer
    - Approximates marginalization

--

4. **Universal Self-Consistency**
    - Extends beyond single-number answers
    - Models self-select most consistent response
    - Works for free-form outputs

# The Three Major APIs for Reasoning

Every major provider now offers **controllable reasoning depth**:

--

| Provider | Parameter | Values | Default |
|---|---|---|---|
| **OpenAI** | `reasoning.effort` | `low`, `medium`, `high` | `medium` |
| **Anthropic** | `thinking.budget_tokens` | 1,024 – max_tokens | — |
| **Anthropic (4.6+)** | `thinking.effort` | like OpenAI | — |
| **Google** | `thinking_budget` | 128 – 32,768 (or `-1`) | 8,192 |

--

**The convergence**: All labs are moving toward the same abstraction — a "thinking effort" dial that trades cost/latency for accuracy.

---

# OpenAI Responses API — Reasoning Effort

```python
from openai import OpenAI
client = OpenAI()

response = client.responses.create(
    model="o3",
    reasoning={"effort": "high"},  # low | medium | high
    input=[
        {"role": "developer", "content": "You are a math tutor."},
        {"role": "user", "content": "Prove that sqrt(2) is irrational."}
    ]
)
print(response.output_text)
```

--

- `reasoning_effort`: `low`, `medium` (default), `high`
- Reasoning tokens preserved across multi-turn calls
- "Reasoning summaries" available for debugging (no extra cost)
- o4-mini: $1.10/M input, $4.40/M output (~10x cheaper than original o3)

---

# Anthropic Extended Thinking API

```python
from anthropic import Anthropic
client = Anthropic()

response = client.messages.create(
    model="claude-sonnet-4-5-20250514",
    max_tokens=16000,
    thinking={
        "type": "enabled",
        "budget_tokens": 10000  # min 1,024
    },
    messages=[{"role": "user", "content": "Solve step by step..."}]
)

# Response contains both thinking and text blocks
for block in response.content:
    if block.type == "thinking":
        print("Thinking:", block.thinking)
    elif block.type == "text":
        print("Answer:", block.text)
```

--

- `budget_tokens`: How much thinking to allow (min 1,024, must be < `max_tokens`)
- Thinking blocks are separate from text blocks in the response
- Claude Opus 4.6 / Sonnet 4.6: Use `effort` parameter instead of `budget_tokens`

---

# Google Gemini 2.5 — Thinking Budget

```python
from google.generativeai import GenerativeModel
model = GenerativeModel("gemini-2.5-pro")

response = model.generate_content(
    "What is the probability of drawing a flush in poker?",
    generation_config={
        "thinking_config": {"thinking_budget": 8192}
    }
)
```

--

- `thinking_budget`: 128–32,768 tokens (default 8,192)
- Set to `-1` for dynamic auto-scaling based on query complexity
- Set to `0` to disable thinking entirely
- **2M token context window** — largest among reasoning models

---

# Agentic Reasoning: Think -> Act -> Observe -> Think

The new standard pattern for autonomous agents:

--

```
+----------+    +----------+    +----------+    +----------+
|  Think   |--->|   Act    |--->| Observe  |--->|  Think   |
|(internal)|    |(tool use)|    |(results) |    | (refine) |
+----------+    +----------+    +----------+    +----------+
```

--

- **Anthropic's "Think" tool**: An explicit tool call that lets Claude pause and reason mid-task

--

- **Interleaved thinking** (Claude 4): Alternate between thinking blocks and tool calls
  - Enable with beta header `interleaved-thinking-2025-05-14`

--

- **OpenAI o3/o4-mini**: Natively use web search, code execution, image generation within the chain of thought

--

- **This is the future**: Reasoning *within* a tool-use loop, not reasoning *then* acting

# Core Techniques for Reasoning LLMs

## 1. Decoding-Based Chain-of-Thought

```python
def cot_decode(prompt, model, n_samples=5):
    candidates = []
    for _ in range(n_samples):
        response = model.generate(prompt, temp=0.7)
        answer = extract_answer(response)
        confidence = model.score_answer(response, answer)
        candidates.append((response, answer, confidence))

    # Select by confidence, not length!
    best = max(candidates, key=lambda x: x[2])
    return best[0]  # Return full reasoning
```

--

**Key**: Sample multiple candidates, select by answer confidence

---

# Core Techniques for Reasoning LLMs

## 2. Self-Consistency Pattern

```python
def self_consistency(prompt, model, n_samples=10):
    answers = []
    for _ in range(n_samples):
        response = model.generate(prompt, temp=0.5)
        answer = extract_answer(response)
        answers.append(answer)

    # Majority voting
    from collections import Counter
    votes = Counter(answers)
    return votes.most_common(1)[0][0]
```

--

**Key**: Marginalize over reasoning paths via voting

---

# Core Techniques for Reasoning LLMs

## 3. Thinking Budget Control

```python
def controlled_reasoning(prompt, model, thinking_tokens=500):
    config = {
        "max_thinking_tokens": thinking_tokens,
        "reasoning_mode": "serial",
        "intermediate_outputs": True
    }

    response = model.generate(prompt, **config)
    return response
```

--

**Key**: Scale output length as a first-class parameter

--

- More tokens = deeper reasoning
- Trade latency for accuracy
- Monitor cost implications

---

## Beyond Simple Voting

    # Group similar reasoning paths

# Prompting Best Practices for Reasoning Models

--

## What's Different

- **Don't over-prompt CoT**: "Think step by step" is redundant — the model handles reasoning internally

--

- **Be explicit about the task**: Clear problem framing matters more than CoT triggers

--

- **Think in briefs, not prompts**: Goal + Return Format + Constraints + Context

--

## Provider-Specific Tips

--

- **OpenAI (o3 / GPT-5.2)**: Use `developer` role for system instructions. Place context after the request.

--

- **Anthropic (Claude)**: Place context before the request. Use `budget_tokens` to control depth.

--

- **For simple tasks**: Use `reasoning_effort: "low"` or disable thinking entirely — saves cost and avoids overthinking

# Limitations of Reasoning LLMs

--

## 1. Performance Trade-offs

- **Increased latency**: Extended thinking process leads to significantly longer response times

--

- **Higher resource requirements**: Often require more computational resources

--

- **Cost implications**: More tokens and processing time translate to higher operational costs

--

- **Scalability challenges**: Multiple concurrent requests become more resource-intensive

---

# Limitations of Reasoning LLMs

## 2. Reasoning Quality Constraints

- **Domain-specific limitations**: Performance varies considerably across different subject areas

--

- **Brittleness with novel problems**: May struggle with problem types not encountered during training

--

- **Inconsistent depth of reasoning**: Quality of reasoning can vary within the same model

--

- **Over-confidence in incorrect reasoning**: May present flawed reasoning with high confidence

---

# Limitations of Reasoning LLMs

## 3. Knowledge and Context Limitations

- **Bounded knowledge**: Limited to training data available at model development time

--

- **Context window constraints**: Struggle with very lengthy problems despite large context windows

--

- **Information integration challenges**: Difficulty maintaining coherence across extensive reasoning chains

--

- **Limited transfer learning**: Reasoning in one domain doesn't always transfer to other domains

---

# Limitations of Reasoning LLMs

## 4. Training and Deployment Challenges

--

- **Prompting vs Fine-tuning Trade-offs**
  - Few-shot CoT: Simple but brittle
  - SFT: Often fails to generalize
  - RL: Requires reliable verifiers

--

- **Verifier Dependency**
  - Success hinges on verifier quality
  - Auto-verification only possible for some tasks
  - Human verification doesn't scale

--

- **Decoding-Objective Mismatch**
  - Model's next-token distribution != user goals
  - Probabilistic outputs vs deterministic needs
  - Requires careful aggregation strategies

# New Research Findings on Limitations

--

## Token Overhead
- One study found reasoning models use **1,953% more tokens** than standard models for equivalent simple answers
- For simple tasks, reasoning is pure overhead with no accuracy benefit

--

## Inverse Compute-Performance (Anthropic, July 2025)
- For some tasks, **longer reasoning hurts accuracy**
- More thinking != always better — calibration matters

--

## Faithfulness of Chain-of-Thought (Anthropic, July 2025)
- "Reasoning models don't always say what they think"
- Visible CoT may **not faithfully represent** the model's actual computation
- **Implication**: Don't blindly trust CoT as a debugging or interpretability tool

--

## DeepSeek-R1 Insight
- Pure RL (no supervised fine-tuning on reasoning traces) can produce sophisticated reasoning
- "Aha moments" emerge spontaneously — models learn to re-examine and verify conclusions

def numeric_puzzle_with_meta_reasoning(target):
    """Demonstrate explicit meta-strategies in reasoning"""

    Target number: {target}

    Meta-strategy thinking:

        max_thinking_tokens=1000,

        'detailed_steps': extract_steps(response),

## North Star: Reasoning for Real Problems

--

### Near-term Opportunities
- **Medical Diagnosis**: Multi-step differential diagnosis
- **Legal Analysis**: Case law reasoning with citations
- **Scientific Research**: Hypothesis generation and testing
- **Software Engineering**: Architecture decisions with trade-offs

--

### Key Enablers
- **Better Verifiers**: Moving beyond correctness to usefulness
- **Efficient Decoding**: Reducing cost of multi-sample approaches
- **Domain Adaptation**: Fine-tuning for specific reasoning patterns
- **Explainability**: Making reasoning traces useful for humans

--

### The Path Forward
- Reasoning + Tools + Retrieval (agentic reasoning)
- Continuous learning from feedback
- Reasoning about reasoning (meta-cognition)

---

# Key Takeaways

--

1. **Test-Time Compute is the Paradigm Shift**: Scale thinking time per-query, not just model size

--

2. **Every Lab Has Reasoning Now**: OpenAI, Anthropic, Google, DeepSeek — reasoning is standard

--

3. **Use the Effort Dial**: `low` for simple tasks, `high` for hard ones — don't overspend

--

4. **Aggregation Wins**: Multiple samples + smart selection consistently beats single-shot

--

5. **CoT is Not Always Faithful**: Don't blindly trust visible reasoning traces

--

6. **Agentic Reasoning is the Future**: Think -> Act -> Observe -> Think loops

--

7. **Combine Approaches**: Retrieval + Reasoning > Reasoning alone

--

8. **Real Applications Need More**: Move beyond benchmarks to production systems
